<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Interference</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Use Inter font */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for range sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px; /* Slightly thinner for compact look */
            border-radius: 3px;
            background: #4a5568; /* gray-700 */
            outline: none;
            opacity: 0.8;
            transition: opacity .2s;
        }
        input[type="range"]:hover {
            opacity: 1;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px; /* Slightly smaller thumb */
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-2 md:p-4">

    <!-- Reduced bottom margin and text size slightly for vertical compaction -->
    <h1 class="text-2xl md:text-3xl font-bold mb-3 text-teal-300">Wave Interference</h1>

    <!-- Canvas: Reduced height to h-48 (mobile) and h-64 (desktop), reduced bottom margin -->
    <canvas id="waveCanvas" class="bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl h-48 md:h-64 mb-3"></canvas>

    <!-- Controls: Flattened to a single horizontal row, reduced padding -->
    <div class="w-full max-w-4xl bg-gray-800 p-3 md:p-4 rounded-lg shadow-xl flex flex-col sm:flex-row items-center gap-3 md:gap-6">
        <label for="phase" class="text-base md:text-lg font-medium text-teal-400 whitespace-nowrap">
            Phase Difference
        </label>
        
        <!-- Slider takes up remaining flexible space -->
        <input type="range" id="phase" min="0" max="6.28318" value="1.25663706144" step="0.314159" class="flex-1 w-full">
        
        <!-- Fixed width for readout to prevent jittering when values change -->
        <span id="phaseReadout" class="text-base md:text-lg text-gray-100 font-mono w-24 text-right">
            0.00 π rad
        </span>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');

            const phaseSlider = document.getElementById('phase');
            const phaseReadout = document.getElementById('phaseReadout');

            // --- Physics Parameters ---
            const propSpeed = 2; // (pixels/frame)
            let amplitude; 
            const frequency = 0.035; 
            let phase = parseFloat(phaseSlider.value); 
            let k = frequency / propSpeed; 
            let time = 0; 

            // Calculate Y position
            function calculateY(x, t, phaseOffset) {
                return amplitude * Math.sin(k * x - frequency * t + phaseOffset);
            }

            // Update readouts
            function updateReadouts() {
                let phaseInPi = phase / Math.PI;
                phaseReadout.textContent = `${phaseInPi.toFixed(2)} π rad`;
            }

            // Slider listener
            phaseSlider.addEventListener('input', (e) => {
                phase = parseFloat(e.target.value);
                updateReadouts(); 
            });
            
            // Resize canvas
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                const yCenter = canvas.height / 2;
                const padding = 20; 
                
                // Set the amplitude based on half the available height (minus padding)
                // so that each wave can reach its peak without clipping.
                amplitude = (yCenter - padding) / 2;
                if (amplitude < 10) amplitude = 10;
            }

            // Draw waves
            function drawWave() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const yCenter = canvas.height / 2;

                // --- Draw Equilibrium Line ---
                ctx.beginPath();
                ctx.moveTo(0, yCenter);
                ctx.lineTo(canvas.width, yCenter);
                ctx.strokeStyle = '#9ca3af'; 
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]); 
                ctx.stroke();
                ctx.setLineDash([]); 

                // --- Draw Amplitude Lines ---
                const A = amplitude; 
                const x_label_pos = 10; 
                const line_end_x = canvas.width; 

                ctx.globalAlpha = 0.8; 
                ctx.setLineDash([2, 2]);
                ctx.font = '12px Inter';
                ctx.textAlign = 'left';

                // Component Amplitude Lines (A and -A)
                ctx.beginPath();
                ctx.moveTo(0, yCenter - A); 
                ctx.lineTo(line_end_x, yCenter - A);
                ctx.moveTo(0, yCenter + A); 
                ctx.lineTo(line_end_x, yCenter + A);
                ctx.strokeStyle = '#3b82f6'; 
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.fillStyle = '#3b82f6';
                ctx.fillText('A', x_label_pos, yCenter - A - 5); 
                ctx.fillText('-A', x_label_pos, yCenter + A + 15);

                ctx.setLineDash([]); 
                ctx.globalAlpha = 1.0; 

                // --- Draw Wave Paths ---
                const path1 = new Path2D(); 
                const path2 = new Path2D(); 

                const y1_start = calculateY(0, time, 0);
                const y2_start = calculateY(0, time, phase);

                path1.moveTo(0, yCenter + y1_start);
                path2.moveTo(0, yCenter + y2_start);

                const beadPositions1 = [];
                const beadPositions2 = [];
                const segmentLength = 20;

                for (let x = 1; x < canvas.width; x++) {
                    const y1 = calculateY(x, time, 0);      
                    const y2 = calculateY(x, time, phase);  

                    path1.lineTo(x, yCenter + y1);
                    path2.lineTo(x, yCenter + y2);

                    if (x % segmentLength === 0 && x > 0) {
                        beadPositions1.push({ x: x, y: yCenter + y1 });   
                        beadPositions2.push({ x: x, y: yCenter + y2 });   
                    }
                }

                // Wave 1
                ctx.strokeStyle = '#3b82f6'; 
                ctx.lineWidth = 2; 
                ctx.globalAlpha = 0.6; 
                ctx.shadowBlur = 0;
                ctx.stroke(path1);

                // Wave 2
                ctx.strokeStyle = '#ef4444'; 
                ctx.lineWidth = 2;
                ctx.stroke(path2);

                // Draw Beads Function
                const drawBeads = (positions, color, radius, alpha) => {
                    ctx.fillStyle = color;
                    ctx.globalAlpha = alpha;
                    
                    for (const pos of positions) {
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2); 
                        ctx.fill();
                    }
                };

                // Create initial positions array (including x=0)
                const initPos1 = [{x:0, y: yCenter + y1_start}, ...beadPositions1];
                const initPos2 = [{x:0, y: yCenter + y2_start}, ...beadPositions2];

                drawBeads(initPos1, '#3b82f6', 3.5, 0.6);
                drawBeads(initPos2, '#ef4444', 3.5, 0.6);
                
                ctx.globalAlpha = 1.0; 
            }

            // Animation loop using timestamp to maintain constant speed regardless of framerate
            function animate(timestamp) {
                if (!timestamp) timestamp = performance.now();
                time = timestamp * 0.06;
                
                drawWave();
                requestAnimationFrame(animate);
            }

            // Init
            resizeCanvas(); 
            updateReadouts();
            
            // Pass the initial function reference so timestamp is provided by the browser
            requestAnimationFrame(animate);

            window.addEventListener('resize', resizeCanvas); 
        };
    </script>
</body>
</html>
