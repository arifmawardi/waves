<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinusoidal wave</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Use Inter font */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for range sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px; /* Slightly thinner for compact look */
            border-radius: 3px;
            background: #4a5568; /* gray-700 */
            outline: none;
            opacity: 0.8;
            transition: opacity .2s;
        }
        input[type="range"]:hover {
            opacity: 1;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px; /* Slightly smaller thumb */
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-2 md:p-4">

    <!-- Reduced bottom margin and text size slightly for vertical compaction -->
    <h1 class="text-2xl md:text-3xl font-bold mb-3 text-teal-300">Sinusoidal wave</h1>

    <!-- Canvas: Reduced height to h-48 (mobile) and h-64 (desktop), reduced bottom margin -->
    <canvas id="waveCanvas" class="bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl h-48 md:h-64 mb-3"></canvas>

    <!-- Controls: Flattened to a single horizontal row for desktop, reduced padding -->
    <div class="w-full max-w-4xl bg-gray-800 p-3 md:p-4 rounded-lg shadow-xl flex flex-col md:flex-row items-center gap-4 md:gap-6">
        
        <!-- Amplitude Slider Container -->
        <div class="flex flex-1 items-center gap-3 w-full">
            <label for="amplitude" class="text-base md:text-lg font-medium text-teal-400 whitespace-nowrap">
                Amplitude
            </label>
            <input type="range" id="amplitude" min="10" max="150" value="50" class="flex-1 w-full">
        </div>

        <!-- Frequency Slider Container -->
        <div class="flex flex-1 items-center gap-3 w-full">
            <label for="frequency" class="text-base md:text-lg font-medium text-teal-400 whitespace-nowrap">
                Frequency
            </label>
            <input type="range" id="frequency" min="0.01" max="0.2" value="0.05" step="0.005" class="flex-1 w-full">
        </div>

    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');

            // Get control elements
            const amplitudeSlider = document.getElementById('amplitude');
            const frequencySlider = document.getElementById('frequency');

            // --- Corrected Physics Parameters ---
            const propSpeed = 4; // (pixels/frame)
            
            // Wave parameters controlled by user
            let amplitude = parseFloat(amplitudeSlider.value);
            let frequency = parseFloat(frequencySlider.value); // This is omega (angular frequency)
            
            // Calculated wave parameter
            let k = frequency / propSpeed; // k (wavenumber) = omega / v
            
            let time = 0;

            // Update parameters from controls
            amplitudeSlider.addEventListener('input', (e) => amplitude = parseFloat(e.target.value));
            
            frequencySlider.addEventListener('input', (e) => {
                frequency = parseFloat(e.target.value);
                k = frequency / propSpeed; 
            });

            // Function to resize the canvas
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                // Dynamically adjust maximum amplitude slider limit to prevent 
                // clipping if the window is resized vertically too small.
                const maxAmp = (canvas.height / 2) - 15;
                amplitudeSlider.max = maxAmp;
                if (amplitude > maxAmp) {
                    amplitude = maxAmp;
                    amplitudeSlider.value = maxAmp;
                }
            }

            // Function to draw the wave
            function drawWave() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const yCenter = canvas.height / 2;
                const w = canvas.width;

                // --- 1. Draw the equilibrium line ---
                ctx.strokeStyle = '#4a5568'; // gray-700
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]); // Make it a dashed line
                ctx.beginPath();
                ctx.moveTo(0, yCenter);
                ctx.lineTo(w, yCenter);
                ctx.stroke();
                ctx.setLineDash([]); // Reset line dash

                // --- 2. Draw the continuous wave line ---
                ctx.strokeStyle = '#38b2ac'; // teal-500
                ctx.lineWidth = 3;
                ctx.shadowColor = '#38b2ac';
                ctx.shadowBlur = 8;

                ctx.beginPath();
                
                let yStart = amplitude * Math.sin(k * 0 - frequency * time);
                ctx.moveTo(0, yCenter + yStart); 

                // Draw the wave across the canvas width
                for (let x = 1; x < canvas.width; x++) {
                    let y = Math.sin(k * x - frequency * time);
                    let yFinal = y * amplitude;
                    ctx.lineTo(x, yCenter + yFinal);
                }

                ctx.stroke();
                ctx.shadowBlur = 0; // Reset shadow before drawing beads

                // --- 3. Draw the "beads" (segment markers) on top ---
                const segmentLength = 15; 
                let beadIndex = 0; 

                for (let x = 0; x <= canvas.width; x += segmentLength) {
                    let y = Math.sin(k * x - frequency * time);
                    let yFinal = y * amplitude;
                    
                    // Change Color for the 30th and 50th elements
                    if (beadIndex === 30) {
                        ctx.fillStyle = '#3b82f6'; // Tailwind blue-500
                    } else if (beadIndex === 50) {
                        ctx.fillStyle = '#ef4444'; // Tailwind red-500
                    } else {
                        ctx.fillStyle = '#a0aec0'; // gray-500
                    }
                    
                    ctx.beginPath();
                    ctx.arc(x, yCenter + yFinal, 5, 0, Math.PI * 2); // 5px radius beads
                    ctx.fill();

                    beadIndex++; 
                }
            }

            // Animation loop using timestamp to maintain constant speed regardless of framerate
            function animate(timestamp) {
                if (!timestamp) timestamp = performance.now();
                time = timestamp * 0.06;

                drawWave();
                requestAnimationFrame(animate);
            }

            // Initial setup
            resizeCanvas();
            
            // Pass the initial function reference so timestamp is provided by the browser
            requestAnimationFrame(animate);

            // Resize canvas on window resize
            window.addEventListener('resize', resizeCanvas);
        };
    </script>
</body>
</html>
