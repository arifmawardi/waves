<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave on a String</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Use Inter font */
        body {
            font-family: 'Inter', sans-serif;
        }
        canvas {
            touch-action: none; /* Prevent scrolling on canvas for touch devices */
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        /* Custom styles for range sliders (kept for consistency even if not used here) */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px; /* Slightly thinner for compact look */
            border-radius: 3px;
            background: #4a5568; /* gray-700 */
            outline: none;
            opacity: 0.8;
            transition: opacity .2s;
        }
        input[type="range"]:hover {
            opacity: 1;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px; /* Slightly smaller thumb */
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #38b2ac; /* teal-500 */
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-2 md:p-4">

    <!-- Reduced bottom margin and text size slightly for vertical compaction -->
    <h1 class="text-2xl md:text-3xl font-bold mb-3 text-teal-300">Wave on a String Simulator</h1>
    <p class="text-gray-400 mb-3 -mt-2 text-sm md:text-base text-center">Click and drag the left end of the string to create a wave.</p>

    <!-- Canvas: Reduced height to h-48 (mobile) and h-64 (desktop), reduced bottom margin -->
    <canvas id="waveCanvas" class="bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl h-48 md:h-64 mb-3"></canvas>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');

            // Wave parameters
            let speed = 2; // Fixed speed 
            const padding = 50; 
            
            // State for manual dragging
            let isDragging = false;
            let mouseY = 0;
            
            // This array will store the history of the source's (left end) y-position
            let sourceHistory = [];

            // Timing variables for the fixed timestep frame rate fix
            let lastTimestamp = performance.now();
            let accumulator = 0;
            const fixedTimeStep = 1000 / 60; // Exactly 60 updates per second

            // Helper function to get mouse/touch position relative to canvas
            function getEventPosition(evt) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;

                if (evt.touches) {
                    clientX = evt.touches[0].clientX;
                    clientY = evt.touches[0].clientY;
                } else {
                    clientX = evt.clientX;
                    clientY = evt.clientY;
                }
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            // --- Mouse/Touch Event Listeners ---
            function onDragStart(evt) {
                if (evt.touches) evt.preventDefault(); 
                
                const pos = getEventPosition(evt);
                // Only start dragging if the user clicks near the handle
                if (pos.x < padding + 20 && pos.x > padding - 20) {
                    isDragging = true;
                    mouseY = pos.y;
                    canvas.style.cursor = 'grabbing';
                }
            }

            function onDragMove(evt) {
                if (isDragging) {
                    if (evt.touches) evt.preventDefault();
                    const pos = getEventPosition(evt);
                    mouseY = pos.y;
                }
            }

            function onDragEnd() {
                isDragging = false;
                canvas.style.cursor = 'grab';
            }

            canvas.addEventListener('mousedown', onDragStart);
            canvas.addEventListener('mousemove', onDragMove);
            canvas.addEventListener('mouseup', onDragEnd);
            canvas.addEventListener('mouseleave', onDragEnd);

            canvas.addEventListener('touchstart', onDragStart);
            canvas.addEventListener('touchmove', onDragMove);
            canvas.addEventListener('touchend', onDragEnd);
            canvas.addEventListener('touchcancel', onDragEnd);

            // Function to resize the canvas
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                // (Re)initialize the source history array to match the visible wave width
                const waveWidth = canvas.width - 2 * padding;
                const historySize = Math.ceil(waveWidth / (speed < 1 ? 1 : speed)) + 50;
                sourceHistory = new Array(historySize).fill(0);
                mouseY = canvas.height / 2; // Reset mouse Y to center
            }

            // Function to draw the wave
            function drawWave() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const yCenter = canvas.height / 2;
                
                // --- 1. Draw the continuous wave line ---
                ctx.strokeStyle = '#38b2ac'; // teal-500
                ctx.lineWidth = 3;
                ctx.shadowColor = '#38b2ac';
                ctx.shadowBlur = 8;

                ctx.beginPath();
                // The first point is always the most recent in history, starting at padding
                ctx.moveTo(padding, yCenter + sourceHistory[0]); 

                // Draw the wave across the canvas width, respecting padding
                for (let x = padding + 1; x < canvas.width - padding; x++) {
                    const historyIndex = Math.floor((x - padding) / speed);
                    if (historyIndex >= sourceHistory.length) break;

                    const y = yCenter + sourceHistory[historyIndex];
                    ctx.lineTo(x, y);
                }
                ctx.stroke(); 

                // --- 2. Draw the "beads" (segment markers) on top ---
                const segmentLength = 15;
                ctx.fillStyle = '#a0aec0'; // gray-500
                ctx.shadowColor = '#a0aec0';
                ctx.shadowBlur = 4;

                for (let x = padding; x <= canvas.width - padding; x += segmentLength) {
                    const historyIndex = Math.floor((x - padding) / speed);
                    if (historyIndex >= sourceHistory.length) continue;

                    const y = yCenter + sourceHistory[historyIndex];
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2); // 4px radius beads (slightly smaller for compact view)
                    ctx.fill();
                }

                // --- 3. Draw the draggable handle ---
                ctx.fillStyle = isDragging ? '#f6e05e' : '#38b2ac'; // Yellow when grabbed
                ctx.shadowColor = isDragging ? '#f6e05e' : '#38b2ac';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(padding, yCenter + sourceHistory[0], 7, 0, Math.PI * 2); // Handle at padding
                ctx.fill();
                
                // Reset shadow for next frame
                ctx.shadowBlur = 0;
            }

            // Animation loop using fixed timestep for consistent physics speed
            function animate(timestamp) {
                if (!timestamp) timestamp = performance.now();
                
                let deltaTime = timestamp - lastTimestamp;
                lastTimestamp = timestamp;

                // Cap deltaTime to prevent "spiral of death" if tab is inactive
                if (deltaTime > 250) deltaTime = 250;

                accumulator += deltaTime;

                // Update the physics/history array exactly 60 times per second
                while (accumulator >= fixedTimeStep) {
                    let newSourceY = 0;
                    if (isDragging) {
                        // Limit dragging bounds so it doesn't clip outside canvas
                        newSourceY = mouseY - (canvas.height / 2);
                        const maxDrag = (canvas.height / 2) - 15;
                        if (newSourceY > maxDrag) newSourceY = maxDrag;
                        if (newSourceY < -maxDrag) newSourceY = -maxDrag;
                    }
                    
                    sourceHistory.pop(); 
                    sourceHistory.unshift(newSourceY); 

                    accumulator -= fixedTimeStep;
                }

                drawWave();
                requestAnimationFrame(animate);
            }

            // Initial setup
            resizeCanvas();
            
            // Pass the initial function reference so timestamp is provided by the browser
            requestAnimationFrame(animate);

            // Resize canvas on window resize
            window.addEventListener('resize', resizeCanvas);
        };
    </script>
</body>
</html>
