<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standing Wave Simulator</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Use Inter font */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-2 md:p-4">

    <!-- Reduced bottom margin and text size slightly for vertical compaction -->
    <h1 class="text-2xl md:text-3xl font-bold mb-3 text-teal-300">Standing Wave Simulator</h1>

    <!-- Canvas: Reduced height to h-48 (mobile) and h-64 (desktop), reduced bottom margin -->
    <canvas id="waveCanvas" class="bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl h-48 md:h-64 mb-3"></canvas>

    <!-- Controls: Flattened to a single horizontal row for compact text display -->
    <div class="w-full max-w-4xl bg-gray-800 p-3 md:p-4 rounded-lg shadow-xl flex items-center justify-center">
        <p class="text-gray-400 text-center text-sm md:text-base">
            This simulation shows two waves (red and blue) moving in opposite directions.
        </p>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');

            // --- Physics Parameters ---
            const propSpeed = 2; // (pixels/frame)
            let amplitude; // Dynamically set in resizeCanvas
            const frequency = 0.05; // Fixed frequency (omega)
            let phase = 0; // Phase difference in radians
            
            // Calculated wave parameter
            let k = frequency / propSpeed; // k (wavenumber) = omega / v
            let time = 0; 

            // --- Helper functions to calculate Y position ---
            // y(x,t) = A * sin(k*x - omega*t + phase) -> Propagating right
            function calculateY_right(x, t, phaseOffset) {
                return amplitude * Math.sin(k * x - frequency * t + phaseOffset);
            }

            // y(x,t) = A * sin(k*x + omega*t + phase) -> Propagating left
            function calculateY_left(x, t, phaseOffset) {
                return amplitude * Math.sin(k * x + frequency * t + phaseOffset);
            }
            
            // Function to resize the canvas
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                // Dynamically set amplitude to fit within the smaller canvas bounds
                const yCenter = canvas.height / 2;
                const padding = 20;
                amplitude = yCenter - padding;
                if (amplitude < 10) amplitude = 10;
            }

            // Function to draw the waves
            function drawWave() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const yCenter = canvas.height / 2;

                // --- Draw equilibrium line ---
                ctx.beginPath();
                ctx.moveTo(0, yCenter);
                ctx.lineTo(canvas.width, yCenter);
                ctx.strokeStyle = '#6b7280'; // gray-500
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]); // Make it dashed
                ctx.stroke();
                ctx.setLineDash([]); // Reset line dash

                // Create Path2D objects
                const path1 = new Path2D(); // Wave 1 (Blue) -> Right
                const path2 = new Path2D(); // Wave 2 (Red)  -> Left

                // Calculate starting points
                const y1_start = calculateY_right(0, time, 0);   
                const y2_start = calculateY_left(0, time, phase); 
                
                path1.moveTo(0, yCenter + y1_start);
                path2.moveTo(0, yCenter + y2_start);

                const beadPositions1 = [];
                const beadPositions2 = [];
                const segmentLength = 20; // Spaced slightly for better performance

                // Loop across the canvas
                for (let x = 1; x < canvas.width; x++) {
                    const y1 = calculateY_right(x, time, 0); 	
                    const y2 = calculateY_left(x, time, phase); 

                    path1.lineTo(x, yCenter + y1);
                    path2.lineTo(x, yCenter + y2);

                    if (x % segmentLength === 0 && x > 0) {
                        beadPositions1.push({ x: x, y: yCenter + y1 }); 
                        beadPositions2.push({ x: x, y: yCenter + y2 });  
                    }
                }

                // Draw Wave 1 (Blue)
                ctx.strokeStyle = '#3b82f6'; // blue-500
                ctx.lineWidth = 2; 
                ctx.globalAlpha = 0.6; 
                ctx.stroke(path1);

                // Draw Wave 2 (Red)
                ctx.strokeStyle = '#ef4444'; // red-500
                ctx.lineWidth = 2;
                ctx.stroke(path2);

                // Draw Beads Function
                const drawBeads = (positions, color, radius, alpha) => {
                    ctx.fillStyle = color;
                    ctx.globalAlpha = alpha;
                    
                    for (const pos of positions) {
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2); 
                        ctx.fill();
                    }
                };

                // Create initial positions array (including x=0)
                const initPos1 = [{x:0, y: yCenter + y1_start}, ...beadPositions1];
                const initPos2 = [{x:0, y: yCenter + y2_start}, ...beadPositions2];

                drawBeads(initPos1, '#3b82f6', 3.5, 0.6);
                drawBeads(initPos2, '#ef4444', 3.5, 0.6);
                
                ctx.globalAlpha = 1.0; 
            }

            // Animation loop using timestamp to maintain constant speed regardless of framerate
            function animate(timestamp) {
                if (!timestamp) timestamp = performance.now();
                time = timestamp * 0.06;

                drawWave();
                requestAnimationFrame(animate);
            }

            // Initial setup
            resizeCanvas();
            
            // Pass the initial function reference so timestamp is provided by the browser
            requestAnimationFrame(animate);

            // Resize canvas on window resize
            window.addEventListener('resize', resizeCanvas);
        };
    </script>
</body>
</html>
